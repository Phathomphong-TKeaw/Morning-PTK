<!DOCTYPE html>
<html lang="th"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>📈 หุ้นเด่นวันนี้</title>
<style>
  :root{--bg:#0b0e16;--card:#161a28;--bd:#262b3d;--tx:#e7ecf5;--mut:#6b7689;
        --buy:#16c784;--watch:#f0b90b;--sell:#ea3943;--accent:#5b6cff}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--tx);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    padding:max(12px,env(safe-area-inset-top)) 12px 32px}
  h1{font-size:1.15rem;margin:.2rem 0 .1rem;display:flex;align-items:center;gap:.4rem}
  .sub{color:var(--mut);font-size:.75rem;margin-bottom:1rem}
  .grp{font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);
       margin:1.1rem 0 .5rem}
  .card{background:linear-gradient(180deg,var(--card),#0f1320);border:1px solid var(--bd);
        border-left-width:3px;border-radius:12px;padding:.7rem .8rem;margin-bottom:.6rem}
  .row{display:flex;align-items:center;gap:.5rem}
  .tk{font-weight:800;font-size:1.05rem} .mk{color:var(--mut);font-size:.68rem}
  .pill{margin-left:auto;font-size:.68rem;font-weight:700;padding:.12rem .5rem;border-radius:20px}
  .g-A,.g-B{background:rgba(22,199,132,.15);color:var(--buy)}
  .g-C{background:rgba(240,185,11,.15);color:var(--watch)}
  .g-D{background:rgba(234,57,67,.15);color:var(--sell)}
  .setup{font-size:.83rem;margin:.35rem 0 .25rem}
  .meta{color:var(--mut);font-size:.74rem} .meta b{color:var(--tx);font-weight:600}
  .note{background:var(--card);border:1px solid var(--bd);border-radius:10px;
        padding:.6rem .7rem;color:var(--mut);font-size:.78rem;margin-bottom:.8rem}
  .empty{color:var(--mut);text-align:center;padding:2rem 0}
  .ref{display:block;text-align:center;color:var(--accent);font-size:.8rem;
       margin-top:1.2rem;text-decoration:none}
</style></head><body>
<h1>📈 หุ้นเด่นวันนี้</h1>
<div class="sub" id="sub">กำลังโหลด…</div>
<div id="note"></div>
<div id="body"></div>
<a class="ref" href="#" onclick="load();return false">↻ โหลดใหม่</a>
<script>
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function card(p){return `<div class="card g-${esc(p.grade)}" style="border-left-color:${
  p.grade==='A'||p.grade==='B'?'var(--buy)':p.grade==='C'?'var(--watch)':'var(--sell)'}">
  <div class="row"><span class="tk">${esc(p.ticker)}</span>
    <span class="mk">${esc(p.market||'')}</span>
    <span class="pill g-${esc(p.grade)}">${esc(p.grade)}</span></div>
  <div class="setup">${esc(p.setup||p.key_driver||'')}</div>
  <div class="meta">เข้า: <b>${esc(p.entry_zone||'-')}</b> · ${esc(p.time_horizon||'')}</div>
  ${p.key_driver&&p.setup?`<div class="meta">${esc(p.key_driver)}</div>`:''}
</div>`}
async function load(){
  try{
    const r=await fetch('./picks.json?t='+Date.now());
    const d=await r.json();
    const tBkk=(d.published_at_bkk||'').replace('T',' ').slice(0,16);
    document.getElementById('sub').textContent=`${d.date} · อัปเดตล่าสุด ${tBkk} (เวลาไทย)`;
    document.getElementById('note').innerHTML=d.scan_note?`<div class="note">${esc(d.scan_note)}</div>`:'';
    const sw=d.swing_picks||[],va=d.value_picks||[];
    document.getElementById('body').innerHTML=
      (sw.length?`<div class="grp">⚡ Swing (1-3 วัน)</div>`+sw.map(card).join(''):'')+
      (va.length?`<div class="grp">💎 Value (6-18 เดือน)</div>`+va.map(card).join(''):'')+
      (!sw.length&&!va.length?`<div class="empty">ยังไม่มี picks — รอ scan รอบถัดไป</div>`:'');
  }catch(e){
    document.getElementById('sub').textContent='โหลดไม่ได้';
    document.getElementById('body').innerHTML=`<div class="empty">${esc(e.message)}</div>`;
  }
}
load();
</script></body></html>
